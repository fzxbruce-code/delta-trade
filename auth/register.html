<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="注册 三角洲交易 - 三角洲行动道具交易平台">
  <title>注册 - 三角洲交易</title>
  
  <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="../css/design-system.css">
  <link rel="stylesheet" href="../css/components.css">
  
  <script>
    (function() {
      const savedTheme = localStorage.getItem('delta-trade-theme');
      if (savedTheme && savedTheme !== 'system') {
        document.documentElement.setAttribute('data-theme', savedTheme);
      }
    })();
  </script>
  
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .auth-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-8);
    }
    
    .auth-card {
      width: 100%;
      max-width: 420px;
      background-color: var(--bg-card);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-2xl);
      padding: var(--space-10);
    }
    
    .auth-header {
      text-align: center;
      margin-bottom: var(--space-8);
    }
    
    .auth-logo {
      width: 64px;
      height: 64px;
      margin: 0 auto var(--space-4);
      background: linear-gradient(135deg, var(--primary-500) 0%, var(--accent-500) 100%);
      border-radius: var(--radius-xl);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      font-size: var(--text-2xl);
    }
    
    .auth-title {
      font-size: var(--text-2xl);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-2);
    }
    
    .auth-subtitle {
      color: var(--text-secondary);
      font-size: var(--text-sm);
    }
    
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: var(--space-5);
    }
    
    .auth-divider {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      margin: var(--space-6) 0;
    }
    
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background-color: var(--border-primary);
    }
    
    .auth-divider span {
      color: var(--text-tertiary);
      font-size: var(--text-sm);
    }
    
    .social-login {
      display: flex;
      gap: var(--space-3);
    }
    
    .social-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      padding: var(--space-3);
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-lg);
      color: var(--text-primary);
      font-size: var(--text-sm);
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    
    .social-btn:hover {
      background-color: var(--bg-hover);
      border-color: var(--border-secondary);
    }
    
    .auth-footer {
      text-align: center;
      margin-top: var(--space-6);
      font-size: var(--text-sm);
      color: var(--text-secondary);
    }
    
    .terms-row {
      display: flex;
      align-items: flex-start;
      gap: var(--space-2);
    }
    
    .terms-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin-top: 2px;
      accent-color: var(--primary-500);
    }
    
    .terms-row label {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      line-height: 1.5;
    }
    
    .terms-row a {
      color: var(--primary-500);
    }
    
    .benefits-list {
      margin-top: var(--space-6);
      padding-top: var(--space-6);
      border-top: 1px solid var(--border-primary);
    }
    
    .benefits-title {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-3);
    }
    
    .benefit-item {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-sm);
      color: var(--text-secondary);
      margin-bottom: var(--space-2);
    }
    
    .benefit-icon {
      color: var(--success-500);
    }
  </style>
</head>
<body class="auth-page">
  <!-- 简化导航 -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="../index.html" class="navbar-brand">
        <img src="https://buff.163.com/static/images/site/logo.png" alt="BUFF" style="height:28px;" class="logo-dark">
        <img src="../images/buff-logo-dark.png" alt="BUFF" style="height:28px;" class="logo-light">
        <span>三角洲交易</span>
      </a>
      
      <div class="navbar-actions">
        <div class="theme-toggle" role="radiogroup" aria-label="主题选择">
          <button class="theme-toggle-option" data-theme="light" role="radio">☀️</button>
          <button class="theme-toggle-option active" data-theme="dark" role="radio">🌙</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- 注册表单 -->
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">Δ</div>
        <h1 class="auth-title">创建账号</h1>
        <p class="auth-subtitle">加入三角洲交易，开启交易之旅</p>
      </div>
      
      <form class="auth-form" onsubmit="event.preventDefault(); alert('注册功能开发中，敬请期待！');">
        <div class="form-group" style="margin-bottom: 0;">
          <label class="form-label">用户名</label>
          <input type="text" class="form-input" placeholder="选择一个用户名" required>
        </div>
        
        <div class="form-group" style="margin-bottom: 0;">
          <label class="form-label">邮箱地址</label>
          <input type="email" class="form-input" placeholder="your@email.com" required>
        </div>
        
        <div class="form-group" style="margin-bottom: 0;">
          <label class="form-label">密码</label>
          <input type="password" class="form-input" placeholder="至少8位，包含字母和数字" required minlength="8">
        </div>
        
        <div class="form-group" style="margin-bottom: 0;">
          <label class="form-label">确认密码</label>
          <input type="password" class="form-input" placeholder="再次输入密码" required>
        </div>
        
        <div class="terms-row">
          <input type="checkbox" id="terms" required>
          <label for="terms">
            我已阅读并同意 <a href="#">用户协议</a> 和 <a href="#">隐私政策</a>
          </label>
        </div>
        
        <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
          🚀 立即注册
        </button>
      </form>
      
      <div class="auth-divider">
        <span>或使用以下方式注册</span>
      </div>
      
      <div class="social-login">
        <button class="social-btn">
          <span>📱</span>
          <span>微信</span>
        </button>
        <button class="social-btn">
          <span>🐧</span>
          <span>QQ</span>
        </button>
      </div>
      
      <div class="auth-footer">
        已有账号？<a href="login.html">立即登录</a>
      </div>
      
      <div class="benefits-list">
        <div class="benefits-title">注册即可享受：</div>
        <div class="benefit-item">
          <span class="benefit-icon">✓</span>
          <span>安全的担保交易系统</span>
        </div>
        <div class="benefit-item">
          <span class="benefit-icon">✓</span>
          <span>仅 5% 超低手续费</span>
        </div>
        <div class="benefit-item">
          <span class="benefit-icon">✓</span>
          <span>免费武器数据库和攻略工具</span>
        </div>
        <div class="benefit-item">
          <span class="benefit-icon">✓</span>
          <span>7×24 小时客服支持</span>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/theme.js"></script>
</body>
</html>
