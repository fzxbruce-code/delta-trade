<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="登录 三角洲交易 - 三角洲行动道具交易平台">
  <title>登录 - 三角洲交易</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="../css/design-system.css">
  <link rel="stylesheet" href="../css/components.css">
  
  <script>
    (function() {
      const savedTheme = localStorage.getItem('delta-trade-theme');
      if (savedTheme && savedTheme !== 'system') {
        document.documentElement.setAttribute('data-theme', savedTheme);
      }
    })();
  </script>
  
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .auth-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-8);
    }
    
    .auth-card {
      width: 100%;
      max-width: 420px;
      background-color: var(--bg-card);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-2xl);
      padding: var(--space-10);
    }
    
    .auth-header {
      text-align: center;
      margin-bottom: var(--space-8);
    }
    
    .auth-logo {
      width: 64px;
      height: 64px;
      margin: 0 auto var(--space-4);
      background: linear-gradient(135deg, var(--primary-500) 0%, var(--accent-500) 100%);
      border-radius: var(--radius-xl);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      font-size: var(--text-2xl);
    }
    
    .auth-title {
      font-size: var(--text-2xl);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-2);
    }
    
    .auth-subtitle {
      color: var(--text-secondary);
      font-size: var(--text-sm);
    }
    
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: var(--space-5);
    }
    
    .auth-divider {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      margin: var(--space-6) 0;
    }
    
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background-color: var(--border-primary);
    }
    
    .auth-divider span {
      color: var(--text-tertiary);
      font-size: var(--text-sm);
    }
    
    .social-login {
      display: flex;
      gap: var(--space-3);
    }
    
    .social-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      padding: var(--space-3);
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-lg);
      color: var(--text-primary);
      font-size: var(--text-sm);
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    
    .social-btn:hover {
      background-color: var(--bg-hover);
      border-color: var(--border-secondary);
    }
    
    .auth-footer {
      text-align: center;
      margin-top: var(--space-6);
      font-size: var(--text-sm);
      color: var(--text-secondary);
    }
    
    .remember-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .remember-row label {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-sm);
      color: var(--text-secondary);
      cursor: pointer;
    }
    
    .remember-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--primary-500);
    }
    
    .forgot-link {
      font-size: var(--text-sm);
      color: var(--primary-500);
    }
    
    .forgot-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body class="auth-page">
  <!-- 简化导航 -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="../index.html" class="navbar-brand">
        <img src="https://buff.163.com/static/images/site/logo.png" alt="BUFF" style="height:28px;" class="logo-dark">
        <img src="../images/buff-logo-dark.png" alt="BUFF" style="height:28px;" class="logo-light">
        <span>三角洲交易</span>
      </a>
      
      <div class="navbar-actions">
        <div class="theme-toggle" role="radiogroup" aria-label="主题选择">
          <button class="theme-toggle-option" data-theme="light" role="radio">☀️</button>
          <button class="theme-toggle-option active" data-theme="dark" role="radio">🌙</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- 登录表单 -->
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">Δ</div>
        <h1 class="auth-title">欢迎回来</h1>
        <p class="auth-subtitle">登录你的三角洲交易账号</p>
      </div>
      
      <form class="auth-form" onsubmit="event.preventDefault(); alert('登录功能开发中，敬请期待！');">
        <div class="form-group" style="margin-bottom: 0;">
          <label class="form-label">邮箱地址</label>
          <input type="email" class="form-input" placeholder="your@email.com" required>
        </div>
        
        <div class="form-group" style="margin-bottom: 0;">
          <label class="form-label">密码</label>
          <input type="password" class="form-input" placeholder="输入密码" required>
        </div>
        
        <div class="remember-row">
          <label>
            <input type="checkbox">
            <span>记住我</span>
          </label>
          <a href="#" class="forgot-link">忘记密码？</a>
        </div>
        
        <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
          登录
        </button>
      </form>
      
      <div class="auth-divider">
        <span>或使用以下方式登录</span>
      </div>
      
      <div class="social-login">
        <button class="social-btn">
          <span>📱</span>
          <span>微信</span>
        </button>
        <button class="social-btn">
          <span>🐧</span>
          <span>QQ</span>
        </button>
      </div>
      
      <div class="auth-footer">
        还没有账号？<a href="register.html">立即注册</a>
      </div>
    </div>
  </div>

  <script src="../js/theme.js"></script>
</body>
</html>
